# gosnmp e2e test container - SNMPv3 user credentials
# Placed in /var/lib/snmp/snmpd.conf (Debian's persistent store)
#
# createUser directives are processed once on first startup,
# then replaced with localized keys.
#
# Most users: auth=gosnmpTestAuthPass priv=gosnmpTestPrivPass
# UTF-8 users (SHA256+AES, SHA512+AES): non-ASCII passphrases

###############################################################################
# noAuthNoPriv
###############################################################################

createUser noAuthNoPrivUser

###############################################################################
# authNoPriv (one per auth hash)
###############################################################################

createUser authMD5OnlyUser MD5 "gosnmpTestAuthPass"
createUser authSHAOnlyUser SHA "gosnmpTestAuthPass"
createUser authSHA224OnlyUser SHA-224 "gosnmpTestAuthPass"
createUser authSHA256OnlyUser SHA-256 "gosnmpTestAuthPass"
createUser authSHA384OnlyUser SHA-384 "gosnmpTestAuthPass"
createUser authSHA512OnlyUser SHA-512 "gosnmpTestAuthPass"

###############################################################################
# authPriv - DES (one per auth hash)
###############################################################################

createUser authMD5PrivDESUser MD5 "gosnmpTestAuthPass" DES "gosnmpTestPrivPass"
createUser authSHAPrivDESUser SHA "gosnmpTestAuthPass" DES "gosnmpTestPrivPass"
createUser authSHA224PrivDESUser SHA-224 "gosnmpTestAuthPass" DES "gosnmpTestPrivPass"
createUser authSHA256PrivDESUser SHA-256 "gosnmpTestAuthPass" DES "gosnmpTestPrivPass"
createUser authSHA384PrivDESUser SHA-384 "gosnmpTestAuthPass" DES "gosnmpTestPrivPass"
createUser authSHA512PrivDESUser SHA-512 "gosnmpTestAuthPass" DES "gosnmpTestPrivPass"

###############################################################################
# authPriv - AES-128 (one per auth hash)
# SHA256 and SHA512 use non-ASCII UTF-8 passphrases
###############################################################################

createUser authMD5PrivAESUser MD5 "gosnmpTestAuthPass" AES "gosnmpTestPrivPass"
createUser authSHAPrivAESUser SHA "gosnmpTestAuthPass" AES "gosnmpTestPrivPass"
createUser authSHA224PrivAESUser SHA-224 "gosnmpTestAuthPass" AES "gosnmpTestPrivPass"
createUser authSHA256PrivAESUser SHA-256 "gøsnmp-tëst!äuth" AES "gøsnmp-tëst!prïv"
createUser authSHA384PrivAESUser SHA-384 "gosnmpTestAuthPass" AES "gosnmpTestPrivPass"
createUser authSHA512PrivAESUser SHA-512 "gøsnmp-tëst!äuth" AES "gøsnmp-tëst!prïv"

###############################################################################
# authPriv - AES-192 Blumenthal (net-snmp uses AES-192 for Blumenthal mode)
###############################################################################

createUser authSHA512PrivAES192BlmtUser SHA-512 "gosnmpTestAuthPass" AES-192 "gosnmpTestPrivPass"

###############################################################################
# authPriv - AES-192 Reeder / AES-256 Reeder
# net-snmp 5.9+ uses AES-192 and AES-256 names; Reeder vs Blumenthal is
# determined by the key extension algorithm, not the createUser syntax.
# gosnmp differentiates via AES192C/AES256C (Reeder) vs AES192/AES256 (Blumenthal).
# We configure one user per combination and test both key extension paths.
###############################################################################

createUser authSHA512PrivAES192CUser SHA-512 "gosnmpTestAuthPass" AES-192 "gosnmpTestPrivPass"
createUser authMD5PrivAES256CUser MD5 "gosnmpTestAuthPass" AES-256 "gosnmpTestPrivPass"
createUser authSHAPrivAES256CUser SHA "gosnmpTestAuthPass" AES-256 "gosnmpTestPrivPass"
createUser authSHA512PrivAES256CUser SHA-512 "gosnmpTestAuthPass" AES-256 "gosnmpTestPrivPass"
