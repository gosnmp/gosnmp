# gosnmp e2e test container configuration
# Supports SNMPv1/v2c/v3 testing

# Listen on all interfaces (UDP and TCP)
agentAddress udp:161,tcp:161

###############################################################################
# V1/V2c Access Control
###############################################################################

rocommunity public  default
rwcommunity private default

###############################################################################
# V3 Access Control - noAuthNoPriv
###############################################################################

rouser noAuthNoPrivUser noauth

###############################################################################
# V3 Access Control - authNoPriv (read-only)
###############################################################################

rouser authMD5OnlyUser
rouser authSHAOnlyUser
rouser authSHA224OnlyUser
rouser authSHA256OnlyUser
rouser authSHA384OnlyUser
rouser authSHA512OnlyUser

###############################################################################
# V3 Access Control - authPriv DES (read-only)
###############################################################################

rouser authMD5PrivDESUser authPriv
rouser authSHAPrivDESUser authPriv
rouser authSHA224PrivDESUser authPriv
rouser authSHA256PrivDESUser authPriv
rouser authSHA384PrivDESUser authPriv
rouser authSHA512PrivDESUser authPriv

###############################################################################
# V3 Access Control - authPriv AES (read-only)
###############################################################################

rouser authMD5PrivAESUser authPriv
rouser authSHAPrivAESUser authPriv
rouser authSHA224PrivAESUser authPriv
rouser authSHA256PrivAESUser authPriv
rouser authSHA384PrivAESUser authPriv
rouser authSHA512PrivAESUser authPriv

###############################################################################
# V3 Access Control - authPriv AES-192/256 extended ciphers (read-only)
###############################################################################

rouser authSHA512PrivAES192BlmtUser authPriv
rouser authSHA512PrivAES192CUser authPriv
rouser authMD5PrivAES256CUser authPriv
rouser authSHAPrivAES256CUser authPriv
rouser authSHA512PrivAES256CUser authPriv

###############################################################################
# System Information
###############################################################################

sysServices 72
